version: '3.8'

services:
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Set DATABASE_URL in .env.production or externally (required)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# No volumes defined here so the app is stateless in this compose file.
# If you need persistent storage for logs or uploads, add volumes and mount them here.
